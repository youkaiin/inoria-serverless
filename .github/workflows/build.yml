name: Build e Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checar o código
        uses: actions/checkout@v4

      - name: Fazer Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Construir e Enviar a Imagem
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/inoria-serverless:latest
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/inoria-serverless:cache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/inoria-serverless:cache,mode=max
